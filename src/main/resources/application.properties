server.port=${PORT:8080}
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

management.endpoints.web.exposure.include=health,info
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app.jwt.secret=${JWT_SECRET}
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
app.currency=${CURRENCY:INR}
app.allowed-origins=${ALLOWED_ORIGINS:}
app.cloudinary.name=${CLOUDINARY_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.secret-key=${CLOUDINARY_SECRET_KEY:}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.migration.auto-import=true
app.migration.backup-root=migration-backup
